<div class="login-panel">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">THE VILLA TENT</div>
      <div class="login-logo-subtitle">Curated Luxury</div>
    </div>
    <div class="login-header-top">
      <span class="material-icons login-icon">lock</span>
      <h2>Welcome Back</h2>
    </div>
    <p>Sign in to access The Villa Tent Admin Dashboard</p>

    <form class="login-form" (submit)="onLoginClick($event)">
      <div class="field-group">
        <label for="email">Email Address</label>
        <div class="field-input">
          <span class="material-icons field-icon">mail</span>
          <input id="email" type="email" placeholder="Enter your email address" />
        </div>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="field-input">
          <span class="material-icons field-icon">lock</span>
          <input id="password" type="password" placeholder="Enter your password" />
        </div>
      </div>

      <div class="form-row">
        <label class="checkbox-group">
          <input type="checkbox" />
          <span>Remember Me</span>
        </label>
        <a class="forgot-link" href="#">Forgot Password?</a>
      </div>

      <button type="submit" class="login-button">LOGIN</button>
    </form>

    <div class="login-footer">
      <span>Secure Admin Access</span>
      <small>Your connection is protected with 256-bit encryption</small>
    </div>
  </div>
</div>
