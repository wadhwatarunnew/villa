<section class="admin-dashboard">
  <!-- Dashboard Header -->
  <div class="dashboard-header">
    <h1>Dashboard</h1>
    <p>Welcome back! Here's your admin overview.</p>
  </div>

  <!-- Dashboard Cards -->
  <div class="dashboard-cards">
    <div *ngFor="let card of dashboardCards" class="dashboard-card">
      <div class="card-content">
        <div class="card-info">
          <p class="card-title">{{ card.title }}</p>
          <p class="card-value">{{ card.value }}</p>
        </div>
        <div [class]="'icon-wrapper ' + card.color">
          <span class="material-icons">{{ card.icon }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Recent Bookings Section -->
  <div class="bookings-section">
    <h2>Recent Bookings</h2>
    
    <div class="bookings-table-wrapper">
      <table class="bookings-table">
        <thead>
          <tr>
            <th>Customer</th>
            <th>Tent</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let booking of recentBookings" class="booking-row">
            <td>{{ booking.customer }}</td>
            <td>{{ booking.tent }}</td>
            <td>{{ booking.date }}</td>
            <td>
              <span 
                class="status-badge"
                [class.status-confirmed]="booking.status === 'Confirmed'"
                [class.status-pending]="booking.status === 'Pending'">
                {{ booking.status }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
