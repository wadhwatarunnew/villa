<main class="bg-[#fbfbf8] px-10 py-14 text-[#153221] lg:px-10">
  <ng-container *ngIf="post; else notFound">
    <div class="mx-auto grid gap-10 lg:grid-cols-[minmax(0,1fr)_320px]">
      <article>
        <villa-blog-detail-hero [post]="post"></villa-blog-detail-hero>
        <villa-blog-detail-sections></villa-blog-detail-sections>
        <villa-blog-detail-share></villa-blog-detail-share>
        <villa-blog-detail-post-nav [posts]="posts" [currentPost]="post"></villa-blog-detail-post-nav>
      </article>

      <villa-blog-detail-sidebar [posts]="posts"></villa-blog-detail-sidebar>
    </div>
  </ng-container>

  <ng-template #notFound>
    <div class="mx-auto max-w-3xl rounded-md bg-white p-10 text-center shadow-sm">
      <p class="text-lg text-[#55685e]">Blog post not found.</p>
      <a routerLink="/blogs" class="mt-5 inline-flex text-sm font-semibold uppercase tracking-[0.18em] text-[#005b28]">
        Back to blogs
      </a>
    </div>
  </ng-template>
</main>
