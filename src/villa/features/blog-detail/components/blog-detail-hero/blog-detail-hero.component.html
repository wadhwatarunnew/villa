<header>
  <span class="mb-5 inline-flex rounded bg-[#f3f3ee] px-3 py-1.5 text-[11px] font-bold uppercase tracking-[0.14em] text-[#3f5145]">
    {{ post.category }}
  </span>

  <h1 class="max-w-4xl font-serif text-4xl leading-tight text-[#18251d] md:text-5xl">
    {{ post.title }}
  </h1>

  <div class="mt-5 flex flex-wrap items-center gap-3 text-xs font-semibold text-[#6b756e]">
    <span>{{ post.date }}</span>
    <span>•</span>
    <span>{{ post.readTime }}</span>
    <span>•</span>
    <span>By The Villa Tent Team</span>
  </div>

  <div class="mt-8 overflow-hidden rounded-md bg-[#edf0ea]">
    <img [src]="post.image" [alt]="post.title" class="h-[260px] w-full object-cover md:h-[430px]" />
  </div>
</header>
