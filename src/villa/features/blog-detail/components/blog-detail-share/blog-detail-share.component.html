<div class="flex flex-wrap items-center gap-3 border-b border-[#e5e7df] py-8">
  <span class="text-sm font-semibold text-[#26372c]">Share this article:</span>
  <a *ngFor="let link of links"
    [href]="link.url"
    target="_blank"
    rel="noopener noreferrer"
    class="flex h-8 w-8 items-center justify-center rounded-md text-sm font-bold text-white transition hover:opacity-85"
    [ngClass]="link.className"
    [attr.aria-label]="link.label">
    <ng-container [ngSwitch]="link.label">
      <svg *ngSwitchCase="'Facebook'" class="size-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path
          d="M14 8.5V6.75c0-.5.41-.75.82-.75H17V2.25A28.1 28.1 0 0013.82 2C10.67 2 8.5 3.92 8.5 7.38V8.5H5v4h3.5V22H13v-9.5h3.45L17 8.5h-4z" />
      </svg>

      <svg *ngSwitchCase="'Instagram'" class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="5"></rect>
        <circle cx="12" cy="12" r="4"></circle>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle>
      </svg>

      <svg *ngSwitchCase="'YouTube'" class="size-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path
          d="M21.58 7.18a2.74 2.74 0 00-1.93-1.94C17.95 4.8 12 4.8 12 4.8s-5.95 0-7.65.44a2.74 2.74 0 00-1.93 1.94A28.35 28.35 0 002 12a28.35 28.35 0 00.42 4.82 2.74 2.74 0 001.93 1.94c1.7.44 7.65.44 7.65.44s5.95 0 7.65-.44a2.74 2.74 0 001.93-1.94A28.35 28.35 0 0022 12a28.35 28.35 0 00-.42-4.82zM10 15.2V8.8l5.2 3.2L10 15.2z" />
      </svg>

      <svg *ngSwitchCase="'Pinterest'" class="size-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path
          d="M12.02 0C5.4 0 .03 5.37.03 11.99c0 4.93 2.98 9.16 7.24 10.99-.1-.93-.19-2.36.04-3.38.21-.91 1.36-5.78 1.36-5.78s-.35-.69-.35-1.72c0-1.61.93-2.81 2.1-2.81.99 0 1.47.74 1.47 1.63 0 .99-.63 2.47-.96 3.84-.27 1.15.58 2.09 1.71 2.09 2.05 0 3.63-2.16 3.63-5.29 0-2.76-1.99-4.7-4.83-4.7-3.29 0-5.22 2.47-5.22 5.02 0 .99.38 2.06.86 2.64.1.11.11.21.08.32-.09.36-.28 1.15-.32 1.31-.05.21-.17.25-.39.15-1.46-.68-2.37-2.8-2.37-4.51 0-3.67 2.67-7.04 7.69-7.04 4.04 0 7.18 2.88 7.18 6.72 0 4.01-2.53 7.24-6.04 7.24-1.18 0-2.29-.61-2.67-1.34l-.73 2.77c-.26 1.01-.97 2.28-1.45 3.05 1.09.34 2.25.52 3.46.52 6.62 0 11.99-5.37 11.99-11.99C24.01 5.37 18.64 0 12.02 0z" />
      </svg>
    </ng-container>
  </a>
</div>
