<aside class="space-y-5 lg:sticky lg:top-14 lg:self-start">
  <section class="rounded-md border border-[#eceee7] bg-white p-5 shadow-sm">
    <label class="relative block">
      <span class="sr-only">Search blogs</span>
      <input type="search" placeholder="Search blogs..."
        class="h-12 w-full rounded border border-[#e4e7df] px-4 pr-11 text-sm outline-none focus:border-[#005b28]" />
      <span class="material-icons absolute right-3 top-1/2 -translate-y-1/2 text-[20px] text-[#7c857e]">search</span>
    </label>
  </section>

  <!-- <section class="rounded-md border border-[#eceee7] bg-white p-5 shadow-sm">
    <h3 class="mb-5 text-xs font-bold uppercase tracking-[0.18em] text-[#18251d]">Categories</h3>
    <ul class="space-y-4 text-sm font-semibold text-[#435147]">
      <li *ngFor="let category of categories" class="flex items-center justify-between">
        <span>{{ category }}</span>
        <span *ngIf="category !== 'All'" class="material-icons text-[16px] text-[#a8afa9]">chevron_right</span>
      </li>
    </ul>
  </section> -->

  <section class="rounded-md border border-[#eceee7] bg-white p-5 shadow-sm">
    <h3 class="mb-5 text-xs font-bold uppercase tracking-[0.18em] text-[#18251d]">Recent Posts</h3>
    <div class="space-y-5">
      <a *ngFor="let post of recentPosts" [routerLink]="['/', getSlug(post)]"
        class="grid grid-cols-[74px_1fr] gap-4 text-[#18251d] no-underline">
        <img [src]="post.image" [alt]="post.title" class="h-[68px] w-[74px] rounded object-cover" />
        <span>
          <strong class="line-clamp-3 text-xs leading-5 hover:text-[#005b28]">{{ post.title }}</strong>
          <span class="mt-1 block text-xs text-[#8c948d]">{{ post.date }}</span>
        </span>
      </a>
    </div>
  </section>

  <section class="rounded-md bg-[#073b24] p-8 text-center text-white shadow-sm">
    <img src="assets/images/logo.webp" alt="Villa Tent" class="mx-auto mb-6 h-14 w-14 object-contain" />
    <h3 class="font-serif text-2xl leading-tight">Have a Project<br />in Mind?</h3>
    <p class="mx-auto mt-4 max-w-[210px] text-sm leading-6 text-white/75">Let's create something extraordinary together.</p>
    <a routerLink="/quote"
      class="mt-7 inline-flex items-center rounded bg-white px-7 py-3 text-xs font-bold uppercase tracking-[0.12em] text-[#073b24] no-underline">
      Get a Quote
      <span class="material-icons ml-2 text-[18px]">arrow_forward</span>
    </a>
  </section>
</aside>
