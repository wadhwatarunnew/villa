<section class="bg-[#f7f7f5] border-b border-gray-100">
  <div class="px-4 lg:px-10 py-10">
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
      <div *ngFor="let card of contactInfoCards"
        class="flex min-h-[200px] flex-col items-center justify-center text-center rounded-lg border border-gray-100 bg-white px-4 py-5 shadow-[0_1px_6px_rgba(0,0,0,0.04)] transition hover:border-gray-200">
        <div class="mb-3 flex h-12 w-12 items-center justify-center rounded-full bg-[#edf5ee]">
          <svg class="size-5.5 text-[#005b28]" [attr.fill]="card.fill"
            [attr.stroke]="card.fill === 'none' ? 'currentColor' : null" viewBox="0 0 24 24">
            <path *ngFor="let path of card.paths" [attr.stroke-linecap]="card.fill === 'none' ? 'round' : null"
              [attr.stroke-linejoin]="card.fill === 'none' ? 'round' : null"
              [attr.stroke-width]="card.fill === 'none' ? '1.5' : null" [attr.d]="path">
            </path>
          </svg>
        </div>
        <p class="mb-1 text-sm font-bold uppercase tracking-wide text-[#005b28]">{{ card.label }}</p>
        <p class="mb-1 text-sm font-semibold text-gray-950">{{ card.value }}</p>
        <p class="text-[13px] leading-snug text-gray-600">
          <ng-container *ngFor="let detail of card.details; let last = last">
            {{ detail }}<br *ngIf="!last" />
          </ng-container>
        </p>
      </div>
    </div>
  </div>
</section>
