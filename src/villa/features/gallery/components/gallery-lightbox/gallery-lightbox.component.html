<div
  class="fixed inset-0 z-[100] bg-black/95 text-white"
  role="dialog"
  aria-modal="true"
  aria-label="Gallery viewer"
  (click)="close()">
  <div class="flex h-full flex-col" (click)="$event.stopPropagation()">
    <div class="flex items-center justify-between px-4 py-3 sm:px-6">
      <div class="text-sm sm:text-base text-white/80">
        {{ activeIndex + 1 }} / {{ items.length }}
      </div>
      <div class="flex items-center gap-4">
        <button type="button" class="text-white/75 transition hover:text-white" (click)="close()" aria-label="Close">
          <span class="material-icons text-3xl">close</span>
        </button>
      </div>
    </div>

    <div class="relative flex min-h-0 flex-1 items-center justify-center px-4 sm:px-10">
      <button
        type="button"
        class="absolute left-4 top-1/2 -translate-y-1/2 rounded-md bg-white/10 p-2 text-white/80 transition hover:bg-white/20 hover:text-white"
        (click)="prev()"
        aria-label="Previous image">
        <span class="material-icons text-3xl">arrow_back</span>
      </button>

      @if (currentItem) {
        <div class="relative w-full max-w-[1600px] overflow-hidden rounded-[1.25rem]">
          <img
            [src]="currentItem.image"
            [alt]="currentItem.title"
            class="max-h-[calc(100vh-180px)] w-full object-cover" />

          <div class="pointer-events-none absolute inset-0 bg-gradient-to-t from-black/90 via-black/25 to-transparent"></div>

          <div class="absolute inset-x-0 bottom-0 p-5 sm:p-7 lg:p-10">
            <p class="text-sm font-semibold uppercase tracking-[0.2em] text-white/80 sm:text-base">
              {{ currentItem.location }}
            </p>
            <h2 class="mt-3 font-serif text-3xl text-white sm:text-5xl">
              {{ currentItem.title }}
            </h2>
            <p class="mt-3 text-sm font-semibold uppercase tracking-[0.22em] text-white/80 sm:text-[1.05rem]">
              {{ currentItem.category.split('-').join(' ') }}
            </p>
          </div>
        </div>
      }

      <button
        type="button"
        class="absolute right-4 top-1/2 -translate-y-1/2 rounded-md bg-white/10 p-2 text-white/80 transition hover:bg-white/20 hover:text-white"
        (click)="next()"
        aria-label="Next image">
        <span class="material-icons text-3xl">arrow_forward</span>
      </button>
    </div>

    <div class="border-t border-white/10 bg-black/80 px-3 py-3 sm:px-4">
      <div class="flex gap-2 overflow-x-auto">
        @for (item of items; track item.title; let index = $index) {
          <button
            type="button"
            class="relative h-20 w-28 flex-shrink-0 overflow-hidden rounded-md border-2 transition"
            [ngClass]="{
              'border-[#005b28] opacity-100': activeIndex === index,
              'border-transparent opacity-70': activeIndex !== index
            }"
            (click)="select(index)">
            <img [src]="item.image" [alt]="item.title" class="h-full w-full object-cover" />
          </button>
        }
      </div>
    </div>
  </div>
</div>
