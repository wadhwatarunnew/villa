<section class="mx-auto px-6 lg:px-10 py-16">
  <div class="flex justify-between items-center mb-8">
    <div>
      <p class="text-[#005b28] font-bold tracking-[0.2em] text-sm uppercase mb-2 mb-2">From Our Blogs</p>
      <h2 class="text-3xl md:text-4xl lg:text-[2.5rem] font-serif text-[#0e2614]">Insights & Inspiration</h2>
    </div>
    <a href="#"
      class="hidden md:flex items-center text-xs font-bold text-gray-500 hover:text-[#0e2614] tracking-[0.15em] transition uppercase">
      View All Blogs
      <svg class="w-3 h-3 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
      </svg>
    </a>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-6">
    <ng-container *ngFor="let blog of blogs">
      <div
        class="flex gap-4 group cursor-pointer border border-gray-100 p-2 rounded-lg bg-white hover:shadow-sm transition">
        <div class="w-24 h-24 rounded overflow-hidden flex-shrink-0 bg-gray-100">
          <img [src]="blog.image" class="w-full h-full object-cover group-hover:scale-105 transition duration-700"
            [alt]="blog.title" />
        </div>
        <div class="flex flex-col justify-center">
          <p class="text-[#005b28] text-[11px] font-bold tracking-[0.15em] uppercase mb-0.5">{{ blog.category }}</p>
          <h3 class="font-bold text-[#0e2614] leading-snug mb-1.5 group-hover:text-[#005b28] transition">{{ blog.title
            }}</h3>
          <p class="text-xs text-gray-400 font-medium">{{ blog.date }}</p>
        </div>
      </div>
    </ng-container>
  </div>
</section>
