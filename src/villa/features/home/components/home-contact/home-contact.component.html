<section class="mx-auto px-6 lg:px-10 py-16 bg-[#faf9f6]">
  <div class="bg-white rounded-xl border border-gray-100 overflow-hidden flex flex-col lg:flex-row h-full">
    <div class="lg:w-2/5 relative">
      <img src="https://images.unsplash.com/photo-1510798831971-661eb04b3739?q=80&w=800&auto=format&fit=crop"
        class="w-full h-[300px] lg:h-[440px] object-cover" alt="Contact Us">
      <div class="absolute inset-0 bg-black/50"></div>
      <div class="absolute inset-0 p-12 flex flex-col justify-center">
        <h2 class="text-3xl lg:text-4xl font-serif text-white leading-tight mb-4">Let's Build Something Extraordinary
          Together</h2>
        <p class="text-white text-sm">Share your vision with us and we'll bring it to life.</p>
      </div>
    </div>

    <div class="lg:w-3/5 px-12 py-20 flex flex-col justify-center bg-white">
      <form class="space-y-6 w-full">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <div class="relative">
            <input type="text"
              class="w-full border border-gray-100 rounded-md text-xs px-4 py-3.5 focus:outline-none focus:border-[#b48a45] bg-white text-gray-800 placeholder-gray-400 transition-colors"
              placeholder="Full Name*">
          </div>
          <div class="relative">
            <input type="email"
              class="w-full border border-gray-100 rounded-md text-xs px-4 py-3.5 focus:outline-none focus:border-[#b48a45] bg-white text-gray-800 placeholder-gray-400 transition-colors"
              placeholder="Email Address*">
          </div>
          <div class="relative">
            <input type="tel"
              class="w-full border border-gray-100 rounded-md text-xs px-4 py-3.5 focus:outline-none focus:border-[#b48a45] bg-white text-gray-800 placeholder-gray-400 transition-colors"
              placeholder="Phone Number*">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <div class="relative">
            <select
              class="w-full border border-gray-100 rounded-md text-xs px-4 py-3.5 focus:outline-none focus:border-[#b48a45] bg-white text-gray-400 appearance-none transition-colors cursor-pointer">
              <option value="" disabled selected>Country*</option>
              <option value="us">United States</option>
              <option value="uk">United Kingdom</option>
              <option value="ae">UAE</option>
            </select>
            <svg class="w-3 h-3 absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
          <div class="relative">
            <select
              class="w-full border border-gray-100 rounded-md text-xs px-4 py-3.5 focus:outline-none focus:border-[#b48a45] bg-white text-gray-400 appearance-none transition-colors cursor-pointer">
              <option value="" disabled selected>Tent Requirement*</option>
              <option value="resort">Resort Tent</option>
              <option value="safari">Safari Tent</option>
            </select>
            <svg class="w-3 h-3 absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
          <div class="relative">
            <select
              class="w-full border border-gray-100 rounded-md text-xs px-4 py-3.5 focus:outline-none focus:border-[#b48a45] bg-white text-gray-400 appearance-none transition-colors cursor-pointer">
              <option value="" disabled selected>Project Budget</option>
              <option value="low">Under $50k</option>
              <option value="med">$50k - $200k</option>
            </select>
            <svg class="w-3 h-3 absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
        </div>

        <div class="relative">
          <input type="text"
            class="w-full border border-gray-100 rounded-md text-xs px-4 py-3.5 focus:outline-none focus:border-[#b48a45] bg-white text-gray-800 placeholder-gray-400 transition-colors"
            placeholder="Message">
        </div>

        <button type="button"
          class="bg-[#005b28] hover:bg-[#003d1a] text-white px-8 py-3.5 rounded-md text-[11px] font-bold tracking-widest uppercase transition flex items-center group w-full md:w-auto justify-center">
          REQUEST CONSULTATION
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-3 group-hover:translate-x-1 transition-transform"
            fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
          </svg>
        </button>
      </form>
    </div>
  </div>
</section>
