<section class="mx-auto px-6 lg:px-20 py-16 relative">
  <div class="flex justify-between items-center mb-8">
    <div>
      <p class="text-[#005b28] font-bold tracking-[0.2em] text-sm uppercase mb-2 mb-2">Featured Projects</p>
      <h2 class="text-3xl md:text-4xl lg:text-[2.5rem] font-serif text-[#0e2614]">Iconic Projects, Timeless Experiences
      </h2>
    </div>
    <a href="#"
      class="hidden md:flex items-center text-xs font-bold text-gray-500 hover:text-[#0e2614] tracking-[0.15em] transition uppercase">
      View All Projects
      <svg class="w-3 h-3 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
      </svg>
    </a>
  </div>

  <div class="relative">
    <div #projectsSlider
      class="flex space-x-5 overflow-x-auto pb-6 snap-x [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
      <ng-container *ngFor="let project of projects">
        <div class="min-w-[240px] w-[240px] md:min-w-[260px] md:w-[260px] snap-start group cursor-pointer">
          <div class="rounded-t-lg overflow-hidden h-44 relative bg-gray-100">
            <img [src]="project.image" class="w-full h-full object-cover group-hover:scale-105 transition duration-700"
              [alt]="project.title" />
            <div class="absolute inset-0 bg-black/20"></div>
          </div>
          <div class="bg-white px-3 py-4 rounded-b-lg border border-t-0 border-gray-200">
            <h3 class="font-bold text-[#0e2614] text-lg">{{ project.title }}</h3>
            <p class="text-sm text-gray-500 mt-1">{{ project.location }}</p>
          </div>
        </div>
      </ng-container>
    </div>

    <button (click)="scrollSlider(projectsSlider, 'left')"
      class="absolute -left-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-[#0e2614] text-white flex items-center justify-center shadow-lg hover:bg-[#091a0e] transition z-10 hidden lg:flex">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
      </svg>
    </button>
    <button (click)="scrollSlider(projectsSlider, 'right')"
      class="absolute -right-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-[#0e2614] text-white flex items-center justify-center shadow-lg hover:bg-[#091a0e] transition z-10 hidden lg:flex">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
      </svg>
    </button>
  </div>
</section>
