<section class="relative h-[calc(100vh-146px)] flex flex-col justify-center bg-cover bg-center bg-no-repeat"
  style="background-image: url('{{topSection?.image}}');">
  <div class="absolute inset-0 bg-black/45"></div>
  <div class="relative z-10 mx-auto px-10 w-full mt-20">
    <div class="max-w-2xl">
      <p class="text-white font-semibold tracking-[0.2em] text-sm uppercase mb-5">{{topSection?.subtitle}}</p>
      <h1 class="text-white text-5xl md:text-6xl !secondary lg:text-[60px] font-serif leading-[1.3] mb-6" [innerHTML]="topSection?.title">
      </h1>
      <p class="text-white md:text-lg mb-10 max-w-[500px] leading-relaxed">
        {{topSection?.content}}
      </p>
      <div class="flex items-center gap-6">
        <a href="/resort-tent">
          <button
            class="bg-[#005b28] hover:bg-[#003d1a] text-white px-8 py-3.5 rounded-md text-[11px] font-bold tracking-widest uppercase transition flex items-center group">
            explore our tents
            <span class="material-icons ml-3 group-hover:translate-x-1 transition-transform flex-shrink-0">arrow_forward</span>
          </button>
        </a>
      </div>
    </div>
  </div>
  <!-- Hero Bottom Bar -->
  <div class="absolute -bottom-12 left-0 right-0 mx-auto px-6 lg:px-10 z-20 hidden lg:block">
    <div
      class="bg-white rounded-lg shadow-[0_10px_40px_-10px_rgba(0,0,0,0.08)] flex items-stretch divide-x divide-gray-100 py-7 px-4">
      <!-- Item 1 -->
      <div class="flex-1 flex items-center gap-5 px-6">
        <div class="rounded-full size-12 border border-gray-100 flex items-center bg-[#005b2838] justify-center text-[#003d1a] flex-shrink-0">
          <span class="material-icons flex-shrink-0 text-[#003d1a]">check_circle</span>
        </div>
        <div>
          <h4 class="font-bold text-[#0e2614] text-lg tracking-wider uppercase mb-1">Premium Quality</h4>
          <p class="text-sm text-gray-500 leading-snug">High-grade materials built to last</p>
        </div>
      </div>
      <!-- Item 2 -->
      <div class="flex-1 flex items-center gap-5 px-6">
        <div class="rounded-full size-12 border border-gray-100 flex items-center bg-[#005b2838] justify-center text-[#003d1a] flex-shrink-0">
          <span class="material-icons flex-shrink-0 text-[#003d1a]">edit</span>
        </div>
        <div>
          <h4 class="font-bold text-[#0e2614] text-lg tracking-wider uppercase mb-1">Custom Solutions</h4>
          <p class="text-sm text-gray-500 leading-snug">Tailored designs for your unique needs</p>
        </div>
      </div>
      <!-- Item 3 -->
      <div class="flex-1 flex items-center gap-5 px-6">
        <div class="rounded-full size-12 border border-gray-100 flex items-center bg-[#005b2838] justify-center text-[#003d1a] flex-shrink-0">
          <span class="material-icons flex-shrink-0 text-[#003d1a]">public</span>
        </div>
        <div>
          <h4 class="font-bold text-[#0e2614] text-lg tracking-wider uppercase mb-1">Global Delivery</h4>
          <p class="text-sm text-gray-500 leading-snug">Worldwide shipping & support</p>
        </div>
      </div>
      <!-- Item 4 -->
      <div class="flex-1 flex items-center gap-5 px-6">
        <div class="rounded-full size-12 border border-gray-100 flex items-center bg-[#005b2838] justify-center text-[#003d1a] flex-shrink-0">
          <span class="material-icons flex-shrink-0 text-[#003d1a]">eco</span>
        </div>
        <div>
          <h4 class="font-bold text-[#0e2614] text-lg tracking-wider uppercase mb-1">Sustainable</h4>
          <p class="text-sm text-gray-500 leading-snug">Eco-friendly materials for a better tomorrow</p>
        </div>
      </div>
    </div>
  </div>
</section>
