<section class="mx-auto px-6 lg:px-10 pb-16 mt-15">
  <div class="flex justify-between items-end mb-10">
    <div>
      <p class="text-[#005b28] font-bold tracking-[0.2em] text-[10px] uppercase mb-2">Our Tent Collection</p>
      <h2 class="text-3xl md:text-4xl lg:text-[2.5rem] font-serif text-[#0e2614]">Luxury Tents for Every Landscape</h2>
    </div>
    <a href="#" class="hidden md:flex items-center text-[10px] font-bold text-gray-500 hover:text-[#0e2614] tracking-[0.15em] transition uppercase mb-2">
      View All Tents
      <svg class="w-3 h-3 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
      </svg>
    </a>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-5">
    <ng-container *ngFor="let tent of tents">
      <div class="group cursor-pointer flex flex-col h-full">
        <div class="overflow-hidden rounded-lg mb-4 relative aspect-[4/3] bg-gray-100">
          <img [src]="tent.image" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" [alt]="tent.title" />
          <div class="absolute bottom-2 left-2 bg-white/90 backdrop-blur-sm text-[#0e2614] text-[9px] font-bold px-2 py-1 rounded-sm shadow-sm">{{ tent.index }}</div>
        </div>
        <div class="flex justify-between items-start flex-grow">
          <div>
            <h3 class="font-bold text-[#0e2614] text-sm mb-1">{{ tent.title }}</h3>
            <p class="text-[11px] text-gray-500 leading-snug" [innerHTML]="tent.description"></p>
          </div>
          <div class="w-6 h-6 rounded-full border border-gray-300 flex items-center justify-center text-gray-400 group-hover:border-[#0e2614] group-hover:text-[#0e2614] transition">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
          </div>
        </div>
      </div>
    </ng-container>
  </div>
</section>
