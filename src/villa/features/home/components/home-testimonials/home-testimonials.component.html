<section class="mx-auto px-6 lg:px-10 py-16">
  <div class="flex flex-col lg:flex-row gap-10">
    <div class="lg:w-1/4 pt-4">
      <p class="text-[#005b28] font-bold tracking-[0.2em] text-[10px] uppercase mb-2">What Our Clients Say</p>
      <h2 class="text-3xl lg:text-4xl font-serif text-[#0e2614] leading-tight mb-6">Trusted by Leading Hospitality Brands</h2>
    </div>

    <div class="lg:w-3/4 grid grid-cols-1 md:grid-cols-3 gap-6">
      <ng-container *ngFor="let testimonial of testimonials">
        <div class="bg-white p-8 rounded-sm border border-gray-100 shadow-[0_2px_15px_-3px_rgba(0,0,0,0.03)] relative flex flex-col h-full">
          <div class="text-[#005b28] opacity-30 mb-4">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
              <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z" />
            </svg>
          </div>
          <p class="text-[11px] text-[#005b28] leading-relaxed mb-8 flex-grow">{{ testimonial.quote }}</p>
          <div class="flex items-center justify-between border-t border-gray-100 pt-5 mt-auto">
            <div>
              <p class="font-bold text-[#0e2614] text-[11px]">{{ testimonial.name }}</p>
              <p class="text-[9px] text-gray-500 mt-0.5">{{ testimonial.role }}</p>
            </div>
            <div class="text-xs font-serif text-gray-400 italic">{{ testimonial.brand }}</div>
          </div>
        </div>
      </ng-container>
    </div>
  </div>

  <div class="mt-20 text-center relative px-8">
    <p class="text-[#005b28] font-bold tracking-[0.25em] text-[9px] uppercase mb-8">Trusted By Global Brands</p>

    <div #brandsSlider class="flex items-center justify-center space-x-12 overflow-x-auto [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none] px-4 opacity-60 snap-x">
      <ng-container *ngFor="let brand of brands">
        <div class="text-[#005b28] hover:opacity-100 transition cursor-pointer">
          <span class="font-serif text-xl tracking-wider">{{ brand }}</span>
        </div>
      </ng-container>
    </div>
    <button (click)="scrollSlider(brandsSlider, 'right')"
      class="absolute right-0 top-1/2 mt-4 w-8 h-8 rounded-full border border-gray-200 text-gray-400 flex items-center justify-center hover:bg-gray-50 transition hidden lg:flex z-10 bg-white shadow-sm">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
      </svg>
    </button>
  </div>
</section>
