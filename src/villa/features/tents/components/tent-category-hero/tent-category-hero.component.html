<section class="relative flex items-center bg-cover bg-center text-white px-6 lg:px-10 py-16 min-h-100"
  [style.background-image]="'url(' + image + ')'">
  <div class="absolute inset-0 bg-black/45"></div>
  <div class="relative">
    <h1 class="font-serif text-4xl md:text-5xl">{{ name }}</h1>
    <p class="mt-3 max-w-2xl text-sm leading-relaxed text-white/90">Discover our premium {{ name.toLowerCase() }}
      designs, crafted for exceptional stays.</p>
    </div>
</section>
