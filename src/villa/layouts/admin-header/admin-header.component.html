<header class="admin-header">
    <!-- Left Section: Logo & Toggle -->
    <div class="left-section">
        <img src="/assets/images/logo.webp" alt="The Villa Tent Logo" class="logo-image">
        <div class="logo-text">
          <h1>THE VILLA TENT</h1>
        </div>
    
    </div>

    <!-- Right Section: Profile Dropdown -->
    <div class="right-section">
      <!-- Profile Dropdown -->
      <div class="profile-dropdown" [class.open]="isProfileMenuOpen">
        <button (click)="toggleProfileMenu()" class="profile-btn">
          <img src="/assets/images/logo.webp" alt="Profile" class="profile-avatar">
          <div class="profile-info">
            <span class="profile-name">{{ adminName }}</span>
            <span class="profile-role">{{ adminRole }}</span>
          </div>
          <span class="material-icons dropdown-icon">{{ isProfileMenuOpen ? 'expand_less' : 'expand_more' }}</span>
        </button>

        <!-- Dropdown Menu -->
        <div class="dropdown-menu" *ngIf="isProfileMenuOpen">
          <button (click)="goToProfile()" class="dropdown-item">
            <span class="material-icons">account_circle</span>
            <span>My Profile</span>
          </button>
          <div class="dropdown-divider"></div>
          <button (click)="logout()" class="dropdown-item logout-item">
            <span class="material-icons">logout</span>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </div>
  
</header>
