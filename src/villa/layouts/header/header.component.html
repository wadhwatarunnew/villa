<header class="villa-header bg-white shadow-md sticky top-0 z-50">
  <div class="container mx-auto px-6 py-4">
    <!-- Main Header Content -->
    <div class="flex items-center justify-between">
      <!-- Logo and Brand -->
      <a routerLink="/" class="flex items-center gap-2 flex-shrink-0">
        <div
          class="w-12 h-12 rounded-full border-2 border-amber-900 bg-gradient-to-b from-amber-100 to-white flex items-center justify-center shadow-sm">
          <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 12l9-9 9 9M3 12l9 9 9-9"></path>
          </svg>
        </div>
        <div class="flex flex-col">
          <span class="text-sm font-bold text-amber-900 leading-none">THE VILLA TENT</span>
          <span class="text-xs text-amber-700 leading-none">LUXURY GLAMPING</span>
        </div>
      </a>

      <!-- Navigation Menu - Center -->
      <nav class="hidden 2xl:flex items-center gap-6">
        <a routerLink="/" routerLinkActive="!text-amber-700 underline underline-offset-[6px] decoration-2"
          [routerLinkActiveOptions]="{exact: true}"
          class="text-sm font-semibold text-gray-800 hover:text-amber-700 transition-colors duration-200 whitespace-nowrap">
          HOME
        </a>
        <a routerLink="/about" routerLinkActive="!text-amber-700 underline underline-offset-[6px] decoration-2"
          class="text-sm font-semibold text-gray-800 hover:text-amber-700 transition-colors duration-200 whitespace-nowrap">
          ABOUT US
        </a>
        <div class="relative group">
          <button
            class="text-sm font-semibold text-gray-800 hover:text-amber-700 transition-colors duration-200 flex items-center gap-1 whitespace-nowrap">
            TENT COLLECTIONS
            <svg class="w-4 h-4 group-hover:text-amber-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3">
              </path>
            </svg>
          </button>
        </div>
        <div class="relative group">
          <button
            class="text-sm font-semibold text-gray-800 hover:text-amber-700 transition-colors duration-200 flex items-center gap-1 whitespace-nowrap">
            PROJECTS
            <svg class="w-4 h-4 group-hover:text-amber-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3">
              </path>
            </svg>
          </button>
        </div>
        <a routerLink="/gallery" routerLinkActive="!text-amber-700 underline underline-offset-[6px] decoration-2"
          class="text-sm font-semibold text-gray-800 hover:text-amber-700 transition-colors duration-200 whitespace-nowrap">
          GALLERY
        </a>
        <a routerLink="/videos" routerLinkActive="!text-amber-700 underline underline-offset-[6px] decoration-2"
          class="text-sm font-semibold text-gray-800 hover:text-amber-700 transition-colors duration-200 whitespace-nowrap">
          VIDEOS
        </a>
        <a routerLink="/blogs" routerLinkActive="!text-amber-700 underline underline-offset-[6px] decoration-2"
          class="text-sm font-semibold text-gray-800 hover:text-amber-700 transition-colors duration-200 whitespace-nowrap">
          BLOGS
        </a>
        <a routerLink="/contact" routerLinkActive="!text-amber-700 underline underline-offset-[6px] decoration-2"
          class="text-sm font-semibold text-gray-800 hover:text-amber-700 transition-colors duration-200 whitespace-nowrap">
          CONTACT US
        </a>
      </nav>

      <!-- Action Buttons - Right -->
      <div class="flex items-center gap-4">
        <!-- Download Brochure Button -->
        <button
          class="hidden 2xl:flex items-center gap-2 px-4 py-2 text-sm font-semibold text-gray-800 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors duration-200 whitespace-nowrap">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
          </svg>
          DOWNLOAD BROCHURE
        </button>

        <!-- Get a Quote Button -->
        <button
          class="hidden 2xl:flex px-6 py-2 text-sm font-bold text-white bg-gradient-to-r from-amber-600 to-amber-700 rounded-lg hover:from-amber-700 hover:to-amber-800 transition-all duration-200 shadow-lg hover:shadow-xl items-center gap-2 whitespace-nowrap">
          GET A QUOTE
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </button>

        <!-- Mobile Menu Button -->
        <button (click)="toggleMobileMenu()"
          class="2xl:hidden p-2 text-gray-800 hover:bg-gray-100 rounded-lg transition-colors"
          aria-label="Toggle mobile menu">
          @if (!isMobileMenuOpen) {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
          } @else {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
          }
        </button>
      </div>
    </div>

    <!-- Mobile Menu Overlay -->
    @if (isMobileMenuOpen) {
    <div class="2xl:hidden absolute top-full left-0 right-0 bg-white border-t border-gray-100 shadow-xl z-40">
      <div
        class="overflow-x-auto [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none] border-b border-gray-100">
        <div class="flex min-w-max px-2 py-4">
          <!-- Home -->
          <a routerLink="/" routerLinkActive="!text-amber-700" [routerLinkActiveOptions]="{exact: true}"
            (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center px-4 min-w-[80px] text-gray-800 hover:text-amber-700 transition group border-r border-gray-100 last:border-0">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-2 group-[.active]:bg-amber-50">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                </path>
              </svg>
            </div>
            <span class="text-[9px] font-bold tracking-widest uppercase">HOME</span>
          </a>

          <!-- About Us -->
          <a routerLink="/about" routerLinkActive="!text-amber-700" (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center px-4 min-w-[90px] text-gray-800 hover:text-amber-700 transition group border-r border-gray-100 last:border-0">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-2 group-[.active]:bg-amber-50">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                </path>
              </svg>
            </div>
            <span class="text-[9px] font-bold tracking-widest uppercase whitespace-nowrap">ABOUT US</span>
          </a>

          <!-- Tent Collections -->
          <a routerLink="/tents" routerLinkActive="!text-amber-700" (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center px-4 min-w-[140px] text-gray-800 hover:text-amber-700 transition group border-r border-gray-100 last:border-0 relative">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-2 group-[.active]:bg-amber-50">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M3 21h18M5 21L12 5l7 16M9 21v-4a2 2 0 012-2h2a2 2 0 012 2v4"></path>
              </svg>
            </div>
            <span class="text-[9px] font-bold tracking-widest uppercase whitespace-nowrap flex items-center">
              TENT COLLECTIONS
              <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </span>
          </a>

          <!-- Projects -->
          <a routerLink="/projects" routerLinkActive="!text-amber-700" (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center px-4 min-w-[90px] text-gray-800 hover:text-amber-700 transition group border-r border-gray-100 last:border-0">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-2 group-[.active]:bg-amber-50">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                </path>
              </svg>
            </div>
            <span class="text-[9px] font-bold tracking-widest uppercase">PROJECTS</span>
          </a>

          <!-- Blogs -->
          <a routerLink="/blogs" routerLinkActive="!text-amber-700" (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center px-4 min-w-[80px] text-gray-800 hover:text-amber-700 transition group border-r border-gray-100 last:border-0">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-2 group-[.active]:bg-amber-50">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z">
                </path>
              </svg>
            </div>
            <span class="text-[9px] font-bold tracking-widest uppercase">BLOGS</span>
          </a>

          <!-- Contact -->
          <a routerLink="/contact" routerLinkActive="!text-amber-700" (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center px-4 min-w-[80px] text-gray-800 hover:text-amber-700 transition group">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-2 group-[.active]:bg-amber-50">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                </path>
              </svg>
            </div>
            <span class="text-[9px] font-bold tracking-widest uppercase">CONTACT</span>
          </a>
        </div>
      </div>

      <div class="p-6">
        <button
          class="w-full bg-[#b48a45] hover:bg-amber-700 text-white py-4 rounded text-[11px] font-bold tracking-widest uppercase transition flex items-center justify-center gap-2">
          GET A QUOTE
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
          </svg>
        </button>
      </div>
    </div>
    }
  </div>
</header>
