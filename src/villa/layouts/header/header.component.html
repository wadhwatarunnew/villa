<header class="bg-white shadow-md fixed top-0 left-0 right-0 z-50">
  <div class="mx-auto px-10 py-5">
    <div class="flex items-center justify-between gap-4">
      <a routerLink="/" class="flex items-center gap-2 flex-shrink-0">
        <img src="assets/images/logo.webp" alt="The Vila Tent Logo"
          class="size-15 object-cover border border-[#005b28] rounded-full" />
        <div class="flex flex-col gap-0.5">
          <span class="text-2xl heading font-bold tracking-wider text-[#005b28] uppercase">the vila tent</span>
          <span class="text-xs text-[#005b28] uppercase">luxury tents & hospitality solutions</span>
        </div>
      </a>
      <div class="flex items-center gap-10">
        <nav class="hidden 2xl:flex items-center gap-8">
          <a routerLink="/" routerLinkActive="!text-[#005b28] underline underline-offset-[8px] decoration-2"
            [routerLinkActiveOptions]="{exact: true}"
            class="text-sm font-semibold text-black hover:text-[#005b28] uppercase transition-colors duration-200">
            home
          </a>
          <a routerLink="/about" routerLinkActive="!text-[#005b28] underline underline-offset-[8px] decoration-2"
            class="text-sm font-semibold text-black hover:text-[#005b28] uppercase transition-colors duration-200">
            about us
          </a>
          <div class="relative group">
            <button
              class="text-sm font-semibold text-black hover:text-[#005b28] transition-colors duration-200 flex items-center gap-1 whitespace-nowrap uppercase">
              tent collections
              <svg class="size-4.5 rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
              </svg>
            </button>
          </div>
          <div class="relative group">
            <a routerLink="/projects" routerLinkActive="!text-[#005b28] underline underline-offset-[8px] decoration-2"
              class="text-sm font-semibold text-black hover:text-[#005b28] transition-colors duration-200 flex items-center gap-1 whitespace-nowrap uppercase cursor-pointer">
              projects
              <svg class="size-4.5 rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
              </svg>
            </a>
          </div>
          <a routerLink="/gallery" routerLinkActive="!text-[#005b28] underline underline-offset-[8px] decoration-2"
            class="text-sm font-semibold text-black hover:text-[#005b28] transition-colors duration-200 whitespace-nowrap uppercase">
            gallery
          </a>
          <a routerLink="/videos" routerLinkActive="!text-[#005b28] underline underline-offset-[8px] decoration-2"
            class="text-sm font-semibold text-black hover:text-[#005b28] transition-colors duration-200 whitespace-nowrap uppercase">
            videos
          </a>
          <a routerLink="/blogs" routerLinkActive="!text-[#005b28] underline underline-offset-[8px] decoration-2"
            class="text-sm font-semibold text-black hover:text-[#005b28] transition-colors duration-200 whitespace-nowrap uppercase">
            blogs
          </a>
          <a routerLink="/contact" routerLinkActive="!text-[#005b28] underline underline-offset-[8px] decoration-2"
            class="text-sm font-semibold text-black hover:text-[#005b28] transition-colors duration-200 whitespace-nowrap uppercase">
            contact us
          </a>
        </nav>

        <button
          class="hidden 2xl:flex px-6 py-3.5 text-sm font-medium text-white bg-[#005b28] hover:bg-[#003d1a] rounded-lg transition-all duration-200 shadow-lg items-center gap-2 uppercase">
          get a quote
          <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </button>

        <!-- Mobile Menu Button -->
        <button (click)="toggleMobileMenu()"
          class="2xl:hidden p-2.5 text-white bg-[#005b28] hover:bg-[#003d1a] rounded-lg transition-colors"
          aria-label="Toggle mobile menu">
          @if (!isMobileMenuOpen) {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
          } @else {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
          }
        </button>
      </div>
    </div>

    <!-- Mobile Menu Overlay -->
    @if (isMobileMenuOpen) {
    <div class="2xl:hidden absolute top-full left-0 right-0 bg-white border-t border-gray-100 shadow-xl z-40">
      <div
        class="overflow-x-auto [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none] border-b border-gray-100">
        <div class="flex justify-between px-2 py-4">
          <a routerLink="/" routerLinkActive="!text-[#003d1a]" [routerLinkActiveOptions]="{exact: true}"
            (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center flex-1 px-4 gap-3 hover:text-[#005b28] transition group border-r border-gray-100 last:border-0">
            <div class="flex items-center justify-center group-[.active]:bg-[#005b28]">
              <svg class="size-6.25" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                </path>
              </svg>
            </div>
            <span class="text-[10px] font-bold tracking-wider uppercase">home</span>
          </a>

          <a routerLink="/about" routerLinkActive="!text-[#003d1a]" (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center flex-1 px-4 gap-3 min-w-[90px] text-gray-800 hover:text-[#005b28] transition group border-r border-gray-100 last:border-0">
            <div class="flex items-center justify-center group-[.active]:bg-[#005b28]">
              <svg class="size-6.25" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                </path>
              </svg>
            </div>
            <span class="text-[10px] font-bold tracking-wider uppercase whitespace-nowrap">about us</span>
          </a>

          <a routerLink="/tents" routerLinkActive="!text-[#003d1a]" (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center flex-1 px-4 gap-3 min-w-[140px] text-gray-800 hover:text-[#005b28] transition group border-r border-gray-100 last:border-0 relative">
            <div class="flex items-center justify-center group-[.active]:bg-[#005b28]">
              <svg class="size-6.25" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M3 21h18M5 21L12 5l7 16M9 21v-4a2 2 0 012-2h2a2 2 0 012 2v4"></path>
              </svg>
            </div>
            <span class="text-[10px] font-bold tracking-wider uppercase whitespace-nowrap flex items-center">
              tent collections
              <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </span>
          </a>

          <!-- Projects -->
          <a routerLink="/projects" routerLinkActive="!text-[#003d1a]" (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center flex-1 px-4 gap-3 min-w-[90px] text-gray-800 hover:text-[#005b28] transition group border-r border-gray-100 last:border-0">
            <div class="flex items-center justify-center group-[.active]:bg-[#005b28]">
              <svg class="size-6.25" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                </path>
              </svg>
            </div>
            <span class="text-[10px] font-bold tracking-wider uppercase">projects</span>
          </a>

          <!-- Blogs -->
          <a routerLink="/blogs" routerLinkActive="!text-[#003d1a]" (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center flex-1 px-4 gap-3 hover:text-[#005b28] transition group border-r border-gray-100 last:border-0">
            <div class="flex items-center justify-center group-[.active]:bg-[#005b28]">
              <svg class="size-6.25" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z">
                </path>
              </svg>
            </div>
            <span class="text-[10px] font-bold tracking-wider uppercase">blogs</span>
          </a>

          <!-- Contact -->
          <a routerLink="/contact" routerLinkActive="!text-[#003d1a]" (click)="toggleMobileMenu()"
            class="flex flex-col items-center justify-center flex-1 px-4 gap-3 hover:text-[#005b28] transition group">
            <div class="flex items-center justify-center group-[.active]:bg-[#005b28]">
              <svg class="size-6.25" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                </path>
              </svg>
            </div>
            <span class="text-[10px] font-bold tracking-wider uppercase">contact</span>
          </a>
        </div>
      </div>
      <div class="p-4">
        <button
          class="w-full bg-[#005b28] hover:bg-[#003d1a] text-white py-4 rounded text-[11px] font-medium tracking-widest uppercase transition flex items-center justify-center gap-2">
          get a quote
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
          </svg>
        </button>
      </div>
    </div>
    }
  </div>
</header>
