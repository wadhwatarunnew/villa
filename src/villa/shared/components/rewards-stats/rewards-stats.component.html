<section class="bg-[#003d1a] text-white shadow-sm">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4">
    <div *ngFor="let stat of stats"
      class="flex items-center justify-center gap-4 px-8 py-8 border-b border-white/10 sm:nth-[2n]:border-r-0 lg:border-b-0 lg:border-r lg:border-white/15 last:border-r-0">
      <span class="material-icons text-white shrink-0 !text-3xl" aria-hidden="true">{{ stat.iconName }}</span>
      <div>
        <p class="text-3xl font-serif leading-none text-white">{{ stat.display }}</p>
        <p class="text-sm text-white/80 mt-1">{{ stat.label }}</p>
      </div>
    </div>
  </div>
</section>
